<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toledo City — Parcel Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f14;--surface:#161a23;--surface2:#1e2330;
  --border:#2a3045;--accent:#e8c84a;--text:#e8eaf0;
  --text2:#8892a4;--green:#4ae8a0;--purple:#a04ae8;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
#loading{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity 0.5s;
}
.load-title{font-size:24px;font-weight:800;letter-spacing:-0.02em}
.load-title span{color:var(--accent)}
.load-bar-wrap{width:260px;height:3px;background:var(--surface2)}
.load-bar{height:100%;background:var(--accent);width:0%;transition:width 0.2s}
.load-sub{font-family:var(--mono);font-size:11px;color:var(--text2)}
header{
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  position:relative;z-index:500;flex-shrink:0;
}
.hlogo{display:flex;align-items:center;gap:12px}
.hbadge{width:30px;height:30px;background:var(--accent);color:#0d0f14;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}
.htitle{font-size:14px;font-weight:700}
.htitle span{color:var(--text2);font-weight:400}
.hstats{display:flex;gap:20px}
.hstat{display:flex;flex-direction:column;align-items:flex-end}
.hstat-val{font-family:var(--mono);font-size:13px;color:var(--accent)}
.hstat-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.layout{display:flex;height:calc(100vh - 52px)}
.sidebar{width:270px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sb-section{padding:14px;border-bottom:1px solid var(--border)}
.sb-section h2{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:10px}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px 8px 30px;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:13px}
.mode-btn{display:flex;align-items:center;gap:9px;width:100%;padding:7px 9px;background:transparent;border:1px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;margin-bottom:5px;}
.mode-btn:last-child{margin-bottom:0}
.mode-btn:hover{border-color:var(--accent);color:var(--text)}
.mode-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(232,200,74,.07)}
.mdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:5px}
.leg-swatch{width:20px;height:7px;border-radius:1px}
.detail-scroll{flex:1;overflow-y:auto;padding:14px}
.detail-scroll::-webkit-scrollbar{width:3px}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--border)}
.no-sel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text2);text-align:center}
.no-sel .icon{font-size:30px;opacity:.25}
.no-sel p{font-size:12px;line-height:1.6}
#parcel-detail{display:none}
.d-id{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--accent);margin-bottom:3px}
.d-coords{font-family:var(--mono);font-size:10px;color:var(--text2);margin-bottom:14px}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.d-card{background:var(--surface2);border:1px solid var(--border);padding:9px}
.d-card-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:3px}
.d-card-val{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)}
.d-card-val.acc{color:var(--accent)}
.d-card-val.grn{color:var(--green)}
#map{flex:1}
.marker-cluster-small{background-color:rgba(232,200,74,.15)!important}
.marker-cluster-small div{background-color:rgba(232,200,74,.75)!important;color:#0d0f14!important;font-family:var(--mono)!important;font-size:11px!important;font-weight:500!important}
.marker-cluster-medium{background-color:rgba(232,200,74,.12)!important}
.marker-cluster-medium div{background-color:rgba(232,200,74,.65)!important;color:#0d0f14!important;font-family:var(--mono)!important;font-size:11px!important}
.marker-cluster-large{background-color:rgba(232,200,74,.09)!important}
.marker-cluster-large div{background-color:rgba(232,200,74,.55)!important;color:#0d0f14!important;font-family:var(--mono)!important;font-size:11px!important}
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:0!important;box-shadow:0 8px 32px rgba(0,0,0,.6)!important;color:var(--text)!important}
.leaflet-popup-tip{background:var(--surface)!important}
.leaflet-popup-content{font-family:var(--mono)!important;font-size:12px!important;margin:12px!important;min-width:170px}
.p-id{font-size:14px;font-weight:500;color:var(--accent);margin-bottom:8px}
.p-row{display:flex;justify-content:space-between;gap:12px;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px}
.p-row:last-child{border-bottom:none}
.p-k{color:var(--text2)}.p-v{color:var(--text);font-weight:500}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-control-zoom a:hover{background:var(--surface2)!important;color:var(--accent)!important}
</style>
</head>
<body>

<div id="loading">
  <div class="load-title">Toledo <span>Parcel</span> Map</div>
  <div class="load-bar-wrap"><div class="load-bar" id="lb"></div></div>
  <div class="load-sub" id="ls">Loading parcel data…</div>
</div>

<header>
  <div class="hlogo">
    <div class="hbadge">TC</div>
    <div class="htitle">Toledo City <span>/ Parcel Map</span></div>
  </div>
  <div class="hstats">
    <div class="hstat"><span class="hstat-val" id="st-total">—</span><span class="hstat-lbl">Total Parcels</span></div>
    <div class="hstat"><span class="hstat-val" id="st-visible">—</span><span class="hstat-lbl">In View</span></div>
    <div class="hstat"><span class="hstat-val" id="st-zoom">12</span><span class="hstat-lbl">Zoom</span></div>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sb-section">
      <h2>Search Parcel</h2>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Parcel ID + Enter…">
      </div>
    </div>
    <div class="sb-section">
      <h2>Color By</h2>
      <button class="mode-btn active" onclick="setMode('uniform',this)"><span class="mdot" style="background:#e8c84a"></span>Uniform</button>
      <button class="mode-btn" onclick="setMode('land',this)"><span class="mdot" style="background:#4a9ee8"></span>Land Value</button>
      <button class="mode-btn" onclick="setMode('bldg',this)"><span class="mdot" style="background:#4ae8a0"></span>Building Value</button>
      <button class="mode-btn" onclick="setMode('total',this)"><span class="mdot" style="background:#e85a4a"></span>Total Value</button>
      <button class="mode-btn" onclick="setMode('landonly',this)"><span class="mdot" style="background:#a04ae8"></span>Land Only (no bldg)</button>
    </div>
    <div class="sb-section">
      <h2>Legend</h2>
      <div id="legend">
        <div class="leg-item"><div class="leg-swatch" style="background:#e8c84a"></div><span>All parcels</span></div>
      </div>
    </div>
    <div class="detail-scroll">
      <div class="no-sel" id="no-sel">
        <div class="icon">◎</div>
        <p>Click any parcel<br>to view details</p>
      </div>
      <div id="parcel-detail">
        <div class="d-id" id="d-id"></div>
        <div class="d-coords" id="d-coords"></div>
        <div class="d-grid">
          <div class="d-card"><div class="d-card-lbl">Land Value</div><div class="d-card-val" id="d-land"></div></div>
          <div class="d-card"><div class="d-card-lbl">Building Value</div><div class="d-card-val" id="d-bldg"></div></div>
          <div class="d-card"><div class="d-card-lbl">Total Value</div><div class="d-card-val acc" id="d-total"></div></div>
          <div class="d-card"><div class="d-card-lbl">Type</div><div class="d-card-val grn" id="d-type"></div></div>
          <div class="d-card"><div class="d-card-lbl">Proposed Land Tax</div><div class="d-card-val" id="d-ltax"></div></div>
          <div class="d-card"><div class="d-card-lbl">Proposed Bldg Tax</div><div class="d-card-val" id="d-btax"></div></div>
        </div>
      </div>
    </div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
var colorMode='uniform', allMarkers=[], map, cluster;
var maxLand=0, maxBldg=0, maxTotal=0;

function fmt(n){ return n==null?'—':'$'+Number(n).toLocaleString(); }

function hslColor(val,max,h1,h2){
  var t=max>0?Math.min(1,val/max):0;
  return 'hsl('+(h1+(h2-h1)*t)+','+(65+20*t)+'%,'+(55-18*t)+'%)';
}

function getColor(p){
  if(colorMode==='land')     return hslColor(p[3],maxLand,200,215);
  if(colorMode==='bldg')     return hslColor(p[4],maxBldg,145,165);
  if(colorMode==='total')    return hslColor(p[5],maxTotal,0,18);
  if(colorMode==='landonly') return (p[4]===0&&p[3]>0)?'#a04ae8':'#1e2330';
  return '#e8c84a';
}

function setMode(mode,btn){
  colorMode=mode;
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var legends={
    uniform:'<div class="leg-item"><div class="leg-swatch" style="background:#e8c84a"></div><span>All parcels</span></div>',
    land:'<div class="leg-item"><div class="leg-swatch" style="background:hsl(200,65%,55%)"></div><span>Low land value</span></div><div class="leg-item"><div class="leg-swatch" style="background:hsl(215,85%,37%)"></div><span>High land value</span></div>',
    bldg:'<div class="leg-item"><div class="leg-swatch" style="background:hsl(145,65%,55%)"></div><span>Low bldg value</span></div><div class="leg-item"><div class="leg-swatch" style="background:hsl(165,85%,37%)"></div><span>High bldg value</span></div>',
    total:'<div class="leg-item"><div class="leg-swatch" style="background:hsl(0,65%,55%)"></div><span>Low total value</span></div><div class="leg-item"><div class="leg-swatch" style="background:hsl(18,85%,37%)"></div><span>High total value</span></div>',
    landonly:'<div class="leg-item"><div class="leg-swatch" style="background:#a04ae8"></div><span>Land only</span></div><div class="leg-item"><div class="leg-swatch" style="background:#1e2330"></div><span>Has building</span></div>'
  };
  document.getElementById('legend').innerHTML=legends[mode]||legends.uniform;
  allMarkers.forEach(function(item){
    var c=getColor(item.p);
    item.m.setStyle({fillColor:c,color:c});
  });
}

function showDetail(p){
  document.getElementById('no-sel').style.display='none';
  document.getElementById('parcel-detail').style.display='block';
  document.getElementById('d-id').textContent='#'+p[0];
  document.getElementById('d-coords').textContent=p[1].toFixed(6)+', '+p[2].toFixed(6);
  document.getElementById('d-land').textContent=fmt(p[3]);
  document.getElementById('d-bldg').textContent=fmt(p[4]);
  document.getElementById('d-total').textContent=fmt(p[5]);
  document.getElementById('d-type').textContent=p[4]===0?'Land Only':p[3]===0?'Improvement Only':'Land + Building';
  document.getElementById('d-ltax').textContent=fmt(p[6]);
  document.getElementById('d-btax').textContent=fmt(p[7]);
}

function initMap(){
  document.getElementById('ls').textContent='Building map…';
  document.getElementById('lb').style.width='15%';

  PARCEL_DATA.forEach(function(p){
    if(p[3]>maxLand)  maxLand=p[3];
    if(p[4]>maxBldg)  maxBldg=p[4];
    if(p[5]>maxTotal) maxTotal=p[5];
  });

  document.getElementById('st-total').textContent=PARCEL_DATA.length.toLocaleString();

  map=L.map('map',{center:[41.6663,-83.5883],zoom:12,preferCanvas:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CartoDB',maxZoom:19
  }).addTo(map);

  cluster=L.markerClusterGroup({
    maxClusterRadius:50,
    disableClusteringAtZoom:15,
    chunkedLoading:true,
    chunkInterval:100,
    chunkDelay:20
  });

  var i=0, CHUNK=2000, total=PARCEL_DATA.length;

  function addChunk(){
    var end=Math.min(i+CHUNK,total);
    var batch=[];
    for(;i<end;i++){
      var p=PARCEL_DATA[i];
      var c=getColor(p);
      var m=L.circleMarker([p[1],p[2]],{radius:4,fillColor:c,color:c,weight:0,fillOpacity:0.85});
      (function(marker,parcel){
        marker.on('click',function(){
          showDetail(parcel);
          marker.bindPopup(
            '<div class="p-id">#'+parcel[0]+'</div>'+
            '<div class="p-row"><span class="p-k">Land</span><span class="p-v">'+fmt(parcel[3])+'</span></div>'+
            '<div class="p-row"><span class="p-k">Building</span><span class="p-v">'+fmt(parcel[4])+'</span></div>'+
            '<div class="p-row"><span class="p-k">Total</span><span class="p-v">'+fmt(parcel[5])+'</span></div>'+
            '<div class="p-row"><span class="p-k">Lat</span><span class="p-v">'+parcel[1].toFixed(5)+'</span></div>'+
            '<div class="p-row"><span class="p-k">Lon</span><span class="p-v">'+parcel[2].toFixed(5)+'</span></div>',
            {maxWidth:220}
          ).openPopup();
        });
      })(m,p);
      batch.push(m);
      allMarkers.push({m:m,p:p});
    }
    cluster.addLayers(batch);

    var pct=15+Math.round((i/total)*80);
    document.getElementById('lb').style.width=pct+'%';
    document.getElementById('ls').textContent='Placing parcels… '+i.toLocaleString()+' / '+total.toLocaleString();

    if(i<total){
      setTimeout(addChunk,10);
    } else {
      map.addLayer(cluster);
      document.getElementById('lb').style.width='100%';
      document.getElementById('ls').textContent='Done!';
      var el=document.getElementById('loading');
      el.style.opacity='0';
      setTimeout(function(){el.style.display='none';},500);
      updateStats();
    }
  }

  addChunk();

  map.on('moveend zoomend',updateStats);

  document.getElementById('search-input').addEventListener('keydown',function(e){
    if(e.key!=='Enter') return;
    var q=this.value.trim();
    var found=null;
    for(var j=0;j<PARCEL_DATA.length;j++){
      if(PARCEL_DATA[j][0]===q){found=PARCEL_DATA[j];break;}
    }
    if(found){
      this.style.borderColor='';
      map.setView([found[1],found[2]],18);
      showDetail(found);
    } else {
      this.style.borderColor='#e85a4a';
      setTimeout(function(){document.getElementById('search-input').style.borderColor='';},1200);
    }
  });
}

function updateStats(){
  var bounds=map.getBounds();
  var count=0;
  allMarkers.forEach(function(item){
    if(bounds.contains([item.p[1],item.p[2]])) count++;
  });
  document.getElementById('st-visible').textContent=count.toLocaleString();
  document.getElementById('st-zoom').textContent=map.getZoom();
}

// Load parcel_data.js then init
var s=document.createElement('script');
s.src='parcel_data.js';
s.onload=function(){ initMap(); };
s.onerror=function(){ document.getElementById('ls').textContent='Error loading parcel_data.js — make sure both files are uploaded.'; };
document.head.appendChild(s);
</script>
</body>
</html>
